name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Saga.sln

      - name: Build (TreatWarningsAsErrors=true)
        run: dotnet build Saga.sln -c Release --no-restore

      - name: Unit tests
        run: |
          dotnet test tests/Saga.OrderService.UnitTests/Saga.OrderService.UnitTests.csproj \
            -c Release --no-build \
            --logger "trx;LogFileName=Saga.OrderService.UnitTests.trx" \
            --results-directory "$GITHUB_WORKSPACE/test-results/unit"
          dotnet test tests/Saga.Shared.Contracts.Tests/Saga.Shared.Contracts.Tests.csproj \
            -c Release --no-build \
            --logger "trx;LogFileName=Saga.Shared.Contracts.Tests.trx" \
            --results-directory "$GITHUB_WORKSPACE/test-results/unit"

      # - name: Integration tests (Testcontainers, Docker-on-host)
      #   # Testcontainers spins up sibling Postgres + RabbitMQ via the runner's
      #   # Docker socket. docker-compose.tests.yml is for *local* dev (devs
      #   # without a host dotnet SDK); CI already has the SDK, so run xUnit directly.
      #   run: |
      #     dotnet test tests/Saga.IntegrationTests/Saga.IntegrationTests.csproj \
      #       -c Release --no-build \
      #       --logger "trx;LogFileName=Saga.IntegrationTests.trx" \
      #       --results-directory "$GITHUB_WORKSPACE/test-results/integration"

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: test-results
      #     path: |
      #       test-results/**/*.trx
      #       tests/**/TestResults/**/*
      #     if-no-files-found: warn

  build-images:
    name: build image (${{ matrix.service }})
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: OrderService
            image: saga-order-service
          - service: PaymentService
            image: saga-payment-service
          - service: InventoryService
            image: saga-inventory-service
          - service: ShippingService
            image: saga-shipping-service
          - service: WebUI
            image: saga-web-ui
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        id: ns
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.ns.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/docker/Dockerfile.dotnet
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  scan:
    name: scan (${{ matrix.image }})
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - saga-order-service
          - saga-payment-service
          - saga-inventory-service
          - saga-shipping-service
          - saga-web-ui
    steps:
      - name: Lowercase image owner
        id: ns
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.ns.outputs.owner }}/${{ matrix.image }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.image }}.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
